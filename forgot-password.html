<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password - MAA DIGITAL</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
.auth-page{min-height:100vh;background:linear-gradient(135deg,var(--navy-dark),var(--navy));display:flex;align-items:center;justify-content:center;padding:20px}
.fp-box{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:440px;padding:36px}
</style>
</head>
<body>
<div class="auth-page">
  <div class="fp-box">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:60px;height:60px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 14px">🔒</div>
      <h3>Password Reset</h3>
      <p style="font-size:.85rem;margin-top:6px">Apna registered mobile number daalen</p>
    </div>
    <div id="alertBox"></div>
    <form id="fpForm">
      <div class="form-group">
        <label class="form-label">Mobile Number <span class="req">*</span></label>
        <div class="input-group">
          <span class="input-icon">📱</span>
          <input type="tel" class="form-control" placeholder="10 digit mobile" maxlength="10" required>
        </div>
      </div>
      <button type="submit" class="btn btn-navy btn-block">🔑 OTP Bhejein</button>
    </form>
    <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--gray-100)">
      <p style="font-size:.82rem;color:var(--gray-600);margin-bottom:10px">Ya phir seedha WhatsApp karein:</p>
      <a href="https://wa.me/919898072313?text=Password+reset+chahiye" class="btn btn-whatsapp btn-block">💬 WhatsApp: 9898072313</a>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:.84rem"><a href="login.html" style="color:var(--navy);font-weight:600">← Login par waapis jaayein</a></p>
  </div>
</div>
<script src="assets/js/main.js"></script>
<script>
document.getElementById('fpForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  showAlert('OTP bheja gaya! WhatsApp check karein.','success');
});
</script>
</body>
</html>
