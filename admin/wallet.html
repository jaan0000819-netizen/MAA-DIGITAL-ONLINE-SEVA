<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet Control - Admin - MAA DIGITAL</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<nav class="navbar"><div class="navbar-brand"><div class="logo-icon">🌐</div><div><div class="brand-name">MAA DIGITAL</div><div class="brand-sub">Admin Panel</div></div></div><div class="navbar-actions"><span class="badge badge-danger">ADMIN</span><button class="topbar-btn" onclick="logout()">🚪</button></div></nav>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-sidebar-header"><div class="admin-badge">🔐 Admin</div><div class="user-name" data-user-name>Admin Ji</div></div>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="nav-icon">📊</span> Dashboard</a><a href="members.html"><span class="nav-icon">👥</span> Members</a><a href="orders.html"><span class="nav-icon">📦</span> Orders</a><a href="wallet.html" class="active"><span class="nav-icon">💰</span> Wallet Control</a><a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <main class="admin-main">
    <div class="admin-topbar"><div style="display:flex;align-items:center;gap:12px"><button class="sidebar-toggle-btn" id="sidebarToggle">☰</button><span class="page-title">💰 Wallet Control</span></div></div>
    <div class="admin-content">
      <div class="grid-2" style="gap:20px;align-items:start">
        <div class="admin-form-card">
          <h4>➕ Wallet Recharge (Add Balance)</h4>
          <div id="alertBox"></div>
          <div class="form-group"><label class="form-label">Member ID / Mobile <span class="req">*</span></label><div class="input-group"><span class="input-icon">👤</span><input type="text" class="form-control" placeholder="Member ID ya mobile number"></div></div>
          <div class="form-group"><label class="form-label">Amount (₹) <span class="req">*</span></label><div class="input-group"><span class="input-icon">₹</span><input type="number" class="form-control" placeholder="Amount enter karein"></div></div>
          <div class="form-group"><label class="form-label">Payment Method</label><select class="form-control"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Bonus</option></select></div>
          <div class="form-group"><label class="form-label">Remark</label><input type="text" class="form-control" placeholder="Transaction note..."></div>
          <button class="btn btn-gold btn-block" onclick="showAlert('Wallet recharge successful!','success')">💰 Add Balance</button>
        </div>
        <div>
          <div class="admin-form-card mb-3">
            <h4>➖ Deduct Balance</h4>
            <div class="form-group"><label class="form-label">Member ID <span class="req">*</span></label><input type="text" class="form-control" placeholder="Member ID"></div>
            <div class="form-group"><label class="form-label">Amount <span class="req">*</span></label><div class="input-group"><span class="input-icon">₹</span><input type="number" class="form-control" placeholder="Amount"></div></div>
            <div class="form-group"><label class="form-label">Reason</label><input type="text" class="form-control" placeholder="Deduction reason..."></div>
            <button class="btn btn-danger btn-block" onclick="showAlert('Balance deducted!','warning')">➖ Deduct Balance</button>
          </div>
          <div class="data-card">
            <div class="data-card-header"><h4>Recent Transactions</h4></div>
            <div style="padding:20px"><div class="empty-state"><div class="empty-icon">💸</div><h4>Koi transaction nahi</h4></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../assets/js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{if(!Store.get('user')||Store.get('user').role!=='admin')window.location.href='../login.html';loadUserInfo();document.getElementById('sidebarToggle').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show');});document.getElementById('sidebarOverlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show');});});</script>
</body>
</html>
